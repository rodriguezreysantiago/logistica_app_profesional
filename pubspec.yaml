name: logistica_app_profesional
description: "A new Flutter project for logistics management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ================= ESTADO GLOBAL =================
  provider: ^6.1.2   # ✅ AGREGADO

  # ================= RED Y APIs =================
  dio: ^5.7.0
  http: ^1.2.0

  # ================= SISTEMA Y PERSISTENCIA =================
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  file_picker: ^8.1.7

  # ⚠️ SOLO WINDOWS (podés dejarlo si usás desktop)
  ffi: ^2.1.2
  win32: ^5.5.4

  # ================= REPORTE Y DATOS =================
  excel: ^4.0.6
  csv: ^6.0.0
  intl: ^0.20.2

  # ================= NOTIFICACIONES =================
  flutter_local_notifications: ^17.2.1
  share_plus: ^7.2.2

  # ================= LOCALIZACIÓN =================
  flutter_localizations:
    sdk: flutter

  # ================= FIREBASE =================
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # ================= ARCHIVOS =================
  image_picker: ^1.1.2
  flutter_pdfview: ^1.3.2
  pdfrx: ^1.0.10

  # ================= SEGURIDAD =================
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/fondo_login.jpg