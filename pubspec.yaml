name: logistica_app_profesional
description: "A new Flutter project for logistics management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- RED Y APIs ---
  dio: ^5.7.0
  http: ^1.2.0

  # --- SISTEMA Y PERSISTENCIA (Optimizado para Windows) ---
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  
  # 🔥 VITAL PARA WINDOWS: Manejo de hilos y comunicación nativa C++
  ffi: ^2.1.2
  win32: ^5.5.4

  # --- REPORTE Y DATOS (Excel con filtros y CSV) ---
  excel: ^4.0.6    # <--- AGREGADO PARA FILTROS NATIVOS
  csv: ^6.0.0
  intl: ^0.20.2

  # --- NOTIFICACIONES Y COMPARTIR ---
  flutter_local_notifications: ^17.2.1
  share_plus: ^7.2.2 

  # --- LOCALIZACIÓN ---
  flutter_localizations:
    sdk: flutter

  # --- FIREBASE (Versiones estables para Desktop) ---
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # --- MANEJO DE ARCHIVOS Y PDF ---
  image_picker: ^1.1.2
  flutter_pdfview: ^1.3.2
  pdfrx: ^1.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/fondo_login.jpg