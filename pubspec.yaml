name: logistica_app_profesional
description: "A new Flutter project for logistics management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Localización e Idiomas
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Firebase
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.10
  
  # Fotos y archivos
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  http: ^1.6.0
  file_picker: ^10.3.10
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/fondo_login.jpg