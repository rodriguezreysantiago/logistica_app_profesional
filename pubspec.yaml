name: logistica_app_profesional
description: "A new Flutter project for logistics management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ================= ESTADO GLOBAL =================
  provider: ^6.1.2   # ✅ AGREGADO

  # ================= RED Y APIs =================
  dio: ^5.7.0
  # `http` se removió (2026-04-28): no se importa en ningún archivo,
  # toda la red va por dio.

  # ================= SISTEMA Y PERSISTENCIA =================
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  file_picker: ^8.1.7

  # ⚠️ SOLO WINDOWS DESKTOP — necesarias para que file_picker y otros
  # plugins resuelvan correctamente en target Windows. Si en algún
  # momento la app deja de tener target Windows, se pueden eliminar.
  ffi: ^2.1.2
  win32: ^5.5.4

  # ================= REPORTE Y DATOS =================
  excel: ^4.0.6
  # `archive` para post-procesar el .xlsx generado por `excel` —
  # inyectamos `<autoFilter>` en el XML de las hojas para que Excel
  # active filtros automáticamente al abrir (la lib `excel` no expone
  # esa API). `excel` ya lo trae como dependencia transitiva, lo
  # declaramos explícito para que sea estable.
  archive: ^3.6.1
  # `csv` se removió (2026-04-28): los reportes exportan solo Excel.
  intl: ^0.20.2

  # ================= NOTIFICACIONES =================
  flutter_local_notifications: ^17.2.1
  # `timezone` viene transitiva con flutter_local_notifications pero la
  # declaramos explícita porque la usamos en NotificationService para
  # agendar recordatorios de vencimientos del chofer.
  timezone: ^0.9.4
  share_plus: ^7.2.2

  # ================= LOCALIZACIÓN =================
  flutter_localizations:
    sdk: flutter

  # ================= FIREBASE =================
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  # Crashlytics: solo se inicializa en Android/iOS (Web/Windows nativo
  # no son soportados — el AppLogger hace la decisión en runtime).
  firebase_crashlytics: ^4.1.3
  # Firebase Auth: el login real se hace contra una Cloud Function
  # (`loginConDni`) que valida bcrypt server-side y emite un custom
  # token. La function se llama por HTTPS directo con dio (porque
  # el plugin `cloud_functions` no tiene implementación Windows).
  # Permite cerrar las firestore.rules con `request.auth.uid` (= DNI)
  # y `isAdmin()`.
  firebase_auth: ^5.3.1

  # ================= ARCHIVOS =================
  image_picker: ^1.1.2
  # `flutter_pdfview` se removió (2026-04-28): la previsualización
  # de PDFs se hace con pdfrx (preview_screen.dart).
  pdfrx: ^1.0.10

  # ================= SEGURIDAD =================
  crypto: ^3.0.3      # SHA-256 (legacy, mantener para verificar contraseñas viejas)
  bcrypt: ^1.1.3      # ✅ Hash con salt para nuevas contraseñas (more secure)
  # flutter_secure_storage usa el almacén seguro nativo de cada plataforma:
  #   - Windows: DPAPI (cifrado con la sesión activa de Windows)
  #   - Android: KeyStore + EncryptedSharedPreferences
  #   - iOS/macOS: Keychain
  # Migramos `dni`/`nombre`/`rol`/`isLoggedIn`/`lastDni` desde
  # SharedPreferences (texto plano) a este storage para defender en
  # profundidad contra acceso físico al disco.
  flutter_secure_storage: ^9.2.2

  # ================= UI EXTRAS =================
  table_calendar: ^3.1.2  # Vista calendario mensual para auditoría de vencimientos

  # ================= OCR =================
  # Reconocimiento de texto on-device (sin envío a servidores).
  # Solo funciona en Android e iOS — en Windows / Web se degrada.
  google_mlkit_text_recognition: ^0.13.1

  # ================= OBSERVABILIDAD =================
  # Sentry para error tracking + performance monitoring. Se inicializa
  # solo si SENTRY_DSN viene seteado (--dart-define=SENTRY_DSN=...).
  # Si está vacío, la app corre sin Sentry (modo dev/local).
  # Setup: ver RUNBOOK.md sección "Sentry — observabilidad".
  sentry_flutter: ^8.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/fondo_login.jpg
