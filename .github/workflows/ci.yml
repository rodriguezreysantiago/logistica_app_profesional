# CI — corre en cada push a main y en cada Pull Request hacia main.
#
# Tres jobs en paralelo (uno por componente del stack). Si alguno falla,
# GitHub marca el commit con ✗ rojo y manda mail. Si pasan los tres, ✓.
#
# El workflow NO deploya nada -- solo valida que el repo está sano. El
# deploy sigue siendo manual (`firebase deploy --only ...`) por
# decisión consciente: minimiza el blast radius si algo se cuela.

name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Cancela runs viejos si se pushea de nuevo a la misma rama --
# evita que se acumulen jobs viejos esperando.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history para que el git diff contra el commit base
          # del PR/push detecte correctamente las líneas nuevas (sin
          # esto solo viene el último commit y el diff queda vacío).
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: No nuevos colors hardcoded
        # Falla si en este commit se INTRODUCEN nuevos usos de
        # `Colors.<accent>` (greenAccent, redAccent, orangeAccent,
        # blueAccent, cyanAccent) en archivos .dart de lib/.
        #
        # Estos colores tienen alias en `lib/shared/constants/app_colors.dart`
        # (AppColors.accentGreen, etc.) — usar la constante centralizada
        # facilita rebrand y mantiene consistencia visual.
        #
        # NOTA: NO baneamos `Colors.white|black|transparent|whiteXX|blackXX`
        # ni colores específicos del Material design — esos siguen siendo
        # tokens estándar legítimos.
        #
        # Excluimos `app_colors.dart` y `app_theme.dart` del check porque
        # ahí mencionar Colors.X es legítimo (la paleta tiene aliases que
        # apuntan a Colors.X, y el theme define los colores base).
        #
        # Existen ~820 ocurrencias legacy que se migran incremental cuando
        # se toca cada archivo. Este guard solo previene que la deuda crezca.
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          DIFF=$(git diff "$BASE" HEAD -- 'lib/' \
            ':!lib/shared/constants/app_colors.dart' \
            ':!lib/core/theme/app_theme.dart' \
            || true)
          NUEVOS=$(echo "$DIFF" | grep -E "^\+[^+].*Colors\.(greenAccent|redAccent|orangeAccent|blueAccent|cyanAccent|amberAccent)" || true)
          if [ -n "$NUEVOS" ]; then
            echo "::error::Hay nuevos usos de Colors.<accent> hardcoded. Usá AppColors.accentGreen/Red/Orange/Blue/Cyan en su lugar."
            echo "Líneas detectadas:"
            echo "$NUEVOS"
            exit 1
          fi
          echo "OK: ningún nuevo Colors.<accent> hardcoded en este push."

  bot:
    name: WhatsApp Bot (npm test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # PUPPETEER_SKIP_DOWNLOAD evita descargar ~100MB de Chromium con
    # whatsapp-web.js. CI solo corre tests unitarios puros (feriados,
    # fechas, commands) -- no abre WhatsApp Web ni necesita el browser.
    # Sin esto el job tardaba ~3min; con esto, ~30s.
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
    defaults:
      run:
        working-directory: whatsapp-bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: whatsapp-bot/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm test
        run: npm test

      - name: node --check (sintaxis de cada modulo)
        # Defensa extra: aunque los tests cubren los modulos importantes,
        # node --check valida la sintaxis del resto sin requerir tests.
        run: |
          for f in src/*.js; do
            node --check "$f"
          done

  functions:
    name: Cloud Functions (build + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: npm ci
        run: npm ci

      - name: TypeScript build (tsc)
        # Valida que el codigo TS compila sin errores. Es lo que
        # firebase-tools corre internamente como parte del predeploy.
        run: npm run build

      - name: ESLint
        # Lint actual tira 2 warnings de max-len que conocemos. Los
        # warnings NO fallan -- ESLint solo exit 1 si hay errors.
        # Si en el futuro queremos tratar warnings como bloqueantes,
        # cambiar a: npm run lint -- --max-warnings 0
        run: npm run lint

      - name: Unit tests (node:test sobre lib/ compilado)
        # Tests de helpers puros: verificarPassword, esBcrypt, sha256Hex,
        # hashId. Cubren regression del fix de bcrypt async + el flujo
        # de migracion silenciosa SHA-256 → bcrypt al primer login OK.
        # Tests de los handlers completos (callable functions) requieren
        # firebase-functions-test SDK + mocks -- queda para futura iteracion.
        run: npm test
